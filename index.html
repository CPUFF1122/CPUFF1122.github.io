<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XENO MODS — GET KEY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07080C;
      --surface:     #0E1018;
      --surface2:    #131620;
      --border:      #1C2235;
      --neon:        #00C8FF;
      --neon-glow:   rgba(0,200,255,.45);
      --neon-dim:    #0072B2;
      --neon-soft:   rgba(0,200,255,.08);
      --green:       #00E676;
      --green-glow:  rgba(0,230,118,.4);
      --white:       #E8F0FF;
      --muted:       #5A6A88;
      --warn:        #FFB347;
      --danger:      #FF5252;
      --radius:      12px;
      --font:        'Sarabun', -apple-system, 'Helvetica Neue', sans-serif;
      --mono:        'Share Tech Mono', monospace;
      --total:       3;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── SCAN LINE ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,200,255,.018) 3px, rgba(0,200,255,.018) 4px
      );
      pointer-events: none;
    }

    /* ── AMBIENT BLOBS ── */
    .blob {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(80px);
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,200,255,.07) 0%, transparent 70%);
      top: -180px; left: -160px;
    }
    .blob-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(0,114,255,.06) 0%, transparent 70%);
      bottom: -160px; right: -120px;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      width: 100%;
      padding: 24px 20px 20px;
      display: flex; justify-content: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,200,255,.04) 0%, transparent 100%);
    }
    .header-inner {
      display: flex; align-items: center; gap: 14px;
    }
    .logo-wrap {
      position: relative; width: 60px; height: 60px; flex-shrink: 0;
    }
    .logo-wrap img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--neon);
      box-shadow: 0 0 16px var(--neon-glow);
      display: block;
      animation: pulse-logo 3s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%,100% { box-shadow: 0 0 16px var(--neon-glow); }
      50%      { box-shadow: 0 0 30px var(--neon-glow), 0 0 60px rgba(0,200,255,.2); }
    }
    .header-text h1 {
      font-size: 1.35rem; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--white);
      text-shadow: 0 0 18px rgba(0,200,255,.5);
    }
    .header-text h1 em { color: var(--neon); font-style: normal; }
    .header-text p {
      font-size: .7rem; letter-spacing: .28em;
      text-transform: uppercase; color: var(--muted);
      margin-top: 2px;
    }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 10;
      width: 100%; max-width: 620px;
      padding: 40px 20px 60px;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }

    /* ── SCREEN WRAPPER (fade transitions) ── */
    .screen {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeIn .4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════
       CHECKPOINT SCREEN
    ══════════════════════════════ */

    /* Progress Bar */
    .progress-wrap {
      width: 100%; margin-bottom: 36px;
    }
    .progress-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .progress-title {
      font-size: .72rem; font-weight: 600;
      letter-spacing: .25em; text-transform: uppercase;
      color: var(--neon);
    }
    .progress-count {
      font-family: var(--mono);
      font-size: .9rem;
      color: var(--white);
    }
    .progress-count span { color: var(--neon); }

    .bar-track {
      width: 100%; height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0072B2, var(--neon));
      border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px var(--neon-glow);
      min-width: 0;
    }

    /* Step Dots */
    .step-dots {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 10px;
    }
    .step-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: var(--muted);
      transition: all .3s;
      position: relative;
    }
    .step-dot.done {
      border-color: var(--neon);
      background: rgba(0,200,255,.12);
      color: var(--neon);
      box-shadow: 0 0 10px rgba(0,200,255,.3);
    }
    .step-dot.done::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem;
    }
    .step-dot.done span { display: none; }

    /* Center Card */
    .center-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 28px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .center-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      box-shadow: 0 0 20px var(--neon-glow);
    }

    .step-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--neon-soft);
      border: 1.5px solid var(--neon-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 24px rgba(0,200,255,.15);
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    .card-title {
      font-size: 1.25rem; font-weight: 700;
      color: var(--white);
      line-height: 1.4;
    }
    .card-desc {
      font-size: .9rem; color: #8899BB;
      max-width: 360px;
    }
    .card-desc strong { color: var(--warn); }

    /* Remaining badge */
    .remain-badge {
      background: rgba(0,200,255,.08);
      border: 1px solid var(--neon-dim);
      border-radius: 99px;
      padding: 8px 22px;
      font-size: .82rem; font-weight: 600;
      color: var(--neon);
      letter-spacing: .04em;
    }

    /* CTA Button */
    .cta-btn {
      position: relative;
      width: 100%; max-width: 340px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #0054AA, #0096DD);
      border: none; border-radius: 10px;
      color: #fff; font-family: var(--font);
      font-size: 1rem; font-weight: 700;
      letter-spacing: .06em;
      cursor: pointer;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(0,150,221,.5), 0 4px 20px rgba(0,0,0,.4);
    }
    .cta-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0072FF, #00C8FF);
      opacity: 0;
      transition: opacity .2s;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,200,255,.6), 0 6px 24px rgba(0,0,0,.4); }
    .cta-btn:hover::before { opacity: 1; }
    .cta-btn:active { transform: translateY(0) scale(.98); }
    .cta-btn span { position: relative; z-index: 1; }

    /* Cooldown overlay on button */
    .cta-btn:disabled {
      background: var(--surface2);
      box-shadow: none; cursor: not-allowed;
      color: var(--muted);
    }
    .cta-btn:disabled::before { display: none; }

    /* Cooldown note */
    .cooldown-note {
      font-size: .78rem; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 6px var(--neon);
      animation: blink 1.2s step-start infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ══════════════════════════════
       KEY REVEAL SCREEN
    ══════════════════════════════ */
    .reveal-screen {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      gap: 28px; animation: fadeIn .5s ease;
    }

    .congrats-header {
      text-align: center;
    }
    .congrats-icon {
      font-size: 3.5rem; display: block; margin-bottom: 12px;
      animation: pop .5s cubic-bezier(.17,.67,.83,.67);
    }
    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }
    .congrats-header h2 {
      font-size: 1.6rem; font-weight: 800;
      color: var(--neon);
      text-shadow: 0 0 24px var(--neon-glow);
      letter-spacing: .05em;
    }
    .congrats-header p {
      font-size: .9rem; color: #8899BB; margin-top: 6px;
    }

    .key-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--neon-dim);
      border-radius: 16px;
      padding: 28px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      position: relative; overflow: hidden;
      box-shadow: 0 0 40px rgba(0,200,255,.1);
    }
    .key-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      box-shadow: 0 0 20px var(--neon-glow);
    }
    .key-label-text {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--neon);
    }
    .key-display {
      font-family: var(--mono);
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: var(--white);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 20px;
      width: 100%;
      text-align: center;
      letter-spacing: .08em;
      user-select: all;
      word-break: break-all;
    }
    .key-copy-btn {
      width: 100%; max-width: 300px;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--neon);
      border-radius: 10px;
      color: var(--neon);
      font-family: var(--font);
      font-size: .95rem; font-weight: 700;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      box-shadow: 0 0 12px rgba(0,200,255,.2);
    }
    .key-copy-btn:hover {
      background: rgba(0,200,255,.1);
      box-shadow: 0 0 24px rgba(0,200,255,.4);
    }
    .key-copy-btn.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0,230,118,.08);
      box-shadow: 0 0 20px var(--green-glow);
                        } 

    .key-warn {
      background: rgba(255,179,71,.06);
      border: 1px solid rgba(255,179,71,.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .82rem; color: var(--warn);
      width: 100%;
      display: flex; gap: 10px; align-items: flex-start;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font);
      font-size: .8rem;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 10;
      width: 100%; border-top: 1px solid var(--border);
      padding: 18px 24px; text-align: center;
    }
    footer p { font-size: .72rem; color: var(--muted); letter-spacing: .05em; }
    footer p span { color: var(--neon); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #0F1117;
      border: 1px solid var(--green);
      color: var(--green);
      font-size: .85rem; font-weight: 600;
      padding: 10px 26px;
      border-radius: 50px;
      box-shadow: 0 0 24px var(--green-glow);
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 420px) {
      .center-card { padding: 28px 18px; }
      .step-dot { width: 26px; height: 26px; font-size: .65rem; }
    }

    /* ── DAILY COUNTER BADGE ── */
    .daily-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: .78rem; color: var(--muted);
      margin-bottom: 20px;
    }
    .daily-badge i { color: var(--neon); font-size: .75rem; }
    .daily-badge strong { color: var(--white); }

    /* ── CONTACT ADMIN BAR ── */
    .contact-bar {
      position: relative; z-index: 10;
      width: 100%;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: center; gap: 20px;
      flex-wrap: wrap;
    }
    .contact-bar-label {
      font-size: .72rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted);
    }
    .contact-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--white);
      font-size: .82rem; font-weight: 600;
      text-decoration: none;
      transition: border-color .2s, box-shadow .2s, color .2s;
    }
    .contact-link i { font-size: .9rem; }
    .contact-link.tg-group { border-color: rgba(0,200,255,.3); color: var(--neon); }
    .contact-link.tg-group:hover {
      border-color: var(--neon);
      box-shadow: 0 0 14px rgba(0,200,255,.25);
    }
    .contact-link.tg-admin { border-color: rgba(100,180,255,.2); color: #AAC8FF; }
    .contact-link.tg-admin:hover {
      border-color: #AAC8FF;
      box-shadow: 0 0 14px rgba(100,180,255,.2);
    }

    /* ── ANTI-CHEAT MODAL ── */
    .ac-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,.85);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn .25s ease;
    }
    .ac-modal {
      background: var(--surface);
      border: 1px solid var(--danger);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 420px; width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(255,82,82,.25);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .ac-modal::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(90deg, transparent, var(--danger), transparent);
    }
    .ac-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,82,82,.1);
      border: 1.5px solid var(--danger);
      display: flex; align-items: center; justify-content: center;
      color: var(--danger); font-size: 1.8rem;
    }
    .ac-title {
      font-size: 1.1rem; font-weight: 800; color: var(--danger);
      letter-spacing: .05em;
    }
    .ac-msg {
      font-size: .88rem; color: #CC8888; line-height: 1.6;
    }
    .ac-btn {
      width: 100%;
      padding: 13px;
      background: var(--danger);
      border: none; border-radius: 9px;
      color: #fff; font-family: var(--font);
      font-size: .95rem; font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .ac-btn:hover { opacity: .85; }
  </style>
</head>

const SS_STEP      = 'xeno_ss_step';      // sessionStorage — รีเซ็ตเมื่อปิดแท็บ
const SS_TOKEN     = 'xeno_ss_token';     // sessionStorage — token ยืนยัน session
const LS_DAILY     = 'xeno_daily';        // localStorage  — { date, count }
const LS_KEY_SAVED = 'xeno_last_key';     // localStorage  — คีย์ล่าสุด (optional display)

// ════════════════════════════════════════════
//  SESSION HELPERS
// ════════════════════════════════════════════
function initSession() {
  // สร้าง token ใหม่ถ้ายังไม่มี (เริ่ม session ใหม่)
  if (!sessionStorage.getItem(SS_TOKEN)) {
    sessionStorage.setItem(SS_TOKEN, 'valid_' + Date.now());
    sessionStorage.setItem(SS_STEP, '0');
  }
}

function getStep() {
  return parseInt(sessionStorage.getItem(SS_STEP) || '0');
}

function setStep(n) {
  sessionStorage.setItem(SS_STEP, String(n));
}

function resetSession() {
  sessionStorage.removeItem(SS_TOKEN);
  sessionStorage.removeItem(SS_STEP);
}

// ════════════════════════════════════════════
//  DAILY COUNTER HELPERS
// ════════════════════════════════════════════
function getTodayStr() {
  return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
}

function getDailyCount() {
  try {
    const raw = localStorage.getItem(LS_DAILY);
    if (!raw) return 0;
    const obj = JSON.parse(raw);
    if (obj.date !== getTodayStr()) return 0; // ข้ามวัน → 0
    return obj.count || 0;
  } catch { return 0; }
}

function incrementDailyCount() {
  const count = getDailyCount() + 1;
  localStorage.setItem(LS_DAILY, JSON.stringify({ date: getTodayStr(), count }));
  return count;
}

// ════════════════════════════════════════════
//  ANTI-CHEAT
// ════════════════════════════════════════════
function showCheatModal(msg) {
  document.getElementById('acMsg').innerHTML = msg;
  document.getElementById('acOverlay').style.display = 'flex';
}

function dismissCheatModal() {
  document.getElementById('acOverlay').style.display = 'none';
  resetSession();
  initSession();
  render();
}

// ตรวจสอบว่า step ที่บันทึกใน sessionStorage ถูกต้องหรือไม่
function validateSession() {
  const token = sessionStorage.getItem(SS_TOKEN);
  const step  = getStep();
  if (!token && step > 0) {
    // มี step แต่ไม่มี token — พยายามโกงผ่าน storage manipulation
    showCheatModal('คุณต้องข้ามคีย์ใหม่ทั้งหมด เพราะคุณโกงใช้สแปม 55555 ไอักระจอกไปทำใหม่เลยมึง');
    return false;
  }
  return true;
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
const app = document.getElementById('app');

function render() {
  if (!validateSession()) return;
  const step = getStep();
  if (step >= TOTAL_STEPS) {
    renderFinalStep();
  } else {
    renderCheckpointScreen(step);
  }
}

// ── CHECKPOINT SCREEN ──────────────────────
function renderCheckpointScreen(step) {
  const remaining = TOTAL_STEPS - step;
  const pct = Math.round((step / TOTAL_STEPS) * 100);
  const dailyCount = getDailyCount();

  const dotsHTML = Array.from({ length: TOTAL_STEPS }, (_, i) =>
    `<div class="step-dot ${i < step ? 'done' : ''}"><span>${i + 1}</span></div>`
  ).join('');

  const iconHTML = step === 0
    ? '<i class="fa-solid fa-key"></i>'
    : step < TOTAL_STEPS - 1
      ? '<i class="fa-solid fa-bolt"></i>'
      : '<i class="fa-solid fa-flag-checkered"></i>';

  const titleText = step === 0
    ? 'ยืนยันตัวตนเพื่อรับคีย์ฟรี'
    : step < TOTAL_STEPS - 1
      ? `ผ่านมาแล้ว ${step} ขั้นตอน — ยอดเยี่ยม!`
      : 'ขั้นตอนสุดท้ายแล้ว!';

  const descText = step === 0
    ? `ระบบต้องการให้คุณผ่านลิ้งค์ยืนยัน <strong>${TOTAL_STEPS} ครั้ง</strong> เพื่อปลดล็อกคีย์ฟรี`
    : `คุณต้องผ่านลิ้งค์ยืนยันอีก <strong>${remaining} ครั้ง</strong> เพื่อรับคีย์ฟรี`;

  app.innerHTML = `
    <div class="screen">

      <!-- Daily counter badge -->
      <div class="daily-badge">
        <i class="fa-solid fa-calendar-check"></i>
        วันนี้คุณรับคีย์ไปแล้ว: <strong>${dailyCount} ครั้ง</strong>
      </div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-title"><i class="fa-solid fa-chart-simple"></i>&nbsp; ความคืบหน้า</span>
          <span class="progress-count"><span>${step}</span>/${TOTAL_STEPS}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="step-dots">${dotsHTML}</div>
      </div>

      <!-- Card -->
      <div class="center-card">
        <div class="step-icon">${iconHTML}</div>

        <div class="card-title">${titleText}</div>

        <div class="card-desc">${descText}</div>

        <div class="remain-badge">
          <i class="fa-solid fa-hourglass-half"></i>&nbsp;
          ต้องผ่านอีก ${remaining} ครั้ง จาก ${TOTAL_STEPS} ครั้ง
        </div>

        <button class="cta-btn" id="adBtn" onclick="handleAdClick()">
          <span>
            <i class="fa-solid fa-bolt"></i>&nbsp;&nbsp;กดเพื่อไปสเต็ปถัดไป &nbsp;(${step + 1}/${TOTAL_STEPS})
          </span>
        </button>

        <div class="cooldown-note">
          <span class="live-dot"></span>
          <span>กดปุ่มแล้วรอโฆษณาโหลด จากนั้นกลับมากดซ้ำ</span>
        </div>
      </div>

    </div>
  `;
}

// ── STEP 3 (FINAL) → ปุ่มรับคีย์ผ่าน Telegram ──
function renderFinalStep() {
  const dailyCount = getDailyCount();

  app.innerHTML = `
    <div class="screen">

      <!-- Daily counter badge -->
      <div class="daily-badge">
        <i class="fa-solid fa-calendar-check"></i>
        วันนี้คุณรับคีย์ไปแล้ว: <strong>${dailyCount} ครั้ง</strong>
      </div>

      <!-- Progress (full) -->
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-title"><i class="fa-solid fa-chart-simple"></i>&nbsp; ความคืบหน้า</span>
          <span class="progress-count"><span>${TOTAL_STEPS}</span>/${TOTAL_STEPS}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:100%"></div>
        </div>
        <div class="step-dots">
          ${Array.from({ length: TOTAL_STEPS }, (_, i) =>
            `<div class="step-dot done"><span>${i + 1}</span></div>`
          ).join('')}
        </div>
      </div>

      <!-- Card -->
      <div class="center-card">
        <div class="step-icon"><i class="fa-solid fa-flag-checkered"></i></div>

        <div class="card-title">ผ่านครบ ${TOTAL_STEPS} ขั้นตอนแล้ว!</div>

        <div class="card-desc">
          กดปุ่มด้านล่างเพื่อเข้ากลุ่ม Telegram และรับคีย์ฟรีของคุณจากแอดมินได้เลย
        </div>

        <div class="remain-badge" style="border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08);">
          <i class="fa-solid fa-circle-check"></i>&nbsp; พร้อมรับคีย์แล้ว!
        </div>

        <button class="cta-btn" id="adBtn" onclick="handleTelegramClick()" style="background:linear-gradient(135deg,#0066BB,#0099CC);">
          <span>
            <i class="fa-brands fa-telegram"></i>&nbsp;&nbsp;รับคีย์ผ่าน Telegram
          </span>
        </button>

        <div class="cooldown-note">
          <span class="live-dot" style="background:var(--green);box-shadow:0 0 6px var(--green);"></span>
          <span>กดเพื่อเข้ากลุ่ม — แอดมินจะส่งคีย์ให้คุณ</span>
        </div>
      </div>

    </div>
  `;
}

// ════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════
function handleAdClick() {
  if (!validateSession()) return;
  const btn = document.getElementById('adBtn');
  if (!btn) return;

  // เปิดลิ้งค์โฆษณาในแท็บใหม่ (สเต็ป 1 และ 2)
  window.open(AD_URL, '_blank', 'noopener,noreferrer');

  // เพิ่ม step ใน sessionStorage
  const newStep = getStep() + 1;
  setStep(newStep);

  btn.disabled = true;
  btn.querySelector('span').innerHTML = '<i class="fa-solid fa-circle-check"></i>&nbsp; บันทึกแล้ว กำลังอัปเดต…';

  setTimeout(() => {
    render();
    showToast(newStep >= TOTAL_STEPS
      ? 'ครบแล้ว! กดรับคีย์ผ่าน Telegram ได้เลย'
      : `ผ่านแล้ว ${newStep}/${TOTAL_STEPS} ครั้ง`
    );
  }, 600);
}

function handleTelegramClick() {
  if (!validateSession()) return;

  // นับโควตาต่อวัน
  incrementDailyCount();

  // เปิด Telegram กลุ่ม
  window.open(TG_URL, '_blank', 'noopener,noreferrer');

  // รีเซ็ต session เพื่อให้เริ่มใหม่ถ้าต้องการคีย์อีก
  resetSession();
  initSession();

  setTimeout(() => {
    render();
    showToast('เปิด Telegram แล้ว — รอรับคีย์จากแอดมินได้เลย!');
  }, 500);
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
initSession();
render();
</script>
